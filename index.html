<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>『1』ꪑꫀꪑꫀ ꪜꪖ꠸ꪗꪖ ---profile</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient: radial-gradient(circle at 30% 30%, #141b2b, #0b0f17);
      --card-bg: rgba(18, 25, 40, 0.75);
      --text-primary: #f0f4ff;
      --text-secondary: #b4c6e8;
      --accent: #4affd8;
      --accent-soft: rgba(74, 255, 216, 0.15);
      --border-light: rgba(255, 255, 255, 0.05);
      --shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.7);
      --detail-bg: rgba(25, 35, 55, 0.5);
      --badge-bg: rgba(74, 255, 216, 0.08);
      --icon-color: #4affd8;
      --footer-color: #8a9fc0;
    }

    body.light-mode {
      --bg-gradient: radial-gradient(circle at 30% 30%, #f0f6ff, #d9e2f0);
      --card-bg: rgba(255, 255, 255, 0.7);
      --text-primary: #132435;
      --text-secondary: #2b4b66;
      --border-light: rgba(255, 255, 255, 0.7);
      --shadow: 0 20px 35px -12px rgba(0, 30, 50, 0.2);
      --detail-bg: rgba(255, 255, 255, 0.5);
      --badge-bg: rgba(0, 102, 179, 0.08);
      --footer-color: #2b5a7a;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background 0.3s, color 0.2s;
      line-height: 1.5;
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 460px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border-light);
      border-radius: 3rem;
      padding: 2rem 1.8rem;
      box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.02);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .action-group {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn, .theme-toggle {
      background: var(--detail-bg);
      border: 1px solid var(--border-light);
      border-radius: 3rem;
      padding: 0.3rem 1rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      backdrop-filter: blur(4px);
    }

    .action-btn i, .theme-toggle i {
      color: var(--icon-color);
      font-size: 0.8rem;
    }

    .action-btn:hover, .theme-toggle:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0.2rem auto 1rem;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 30px var(--accent);
      position: relative;
      z-index: 3;
    }

    .rotating-ring {
      position: absolute;
      top: -10px; left: -10px; right: -10px; bottom: -10px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(from 0deg, #ff7b89, #ffb86b, var(--accent), #6bb0ff, #d18bff, #ff7b89);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: rotate 10s linear infinite;
      opacity: 0.8;
      filter: drop-shadow(0 0 10px var(--accent));
      z-index: 2;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffdb8a, #b0e0ff, #fbbfda);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin: 0.3rem 0 0.1rem;
    }

    .typing-container {
      height: 1.8rem;
      font-size: 1rem;
      font-weight: 400;
      color: var(--accent);
      text-align: center;
      margin-bottom: 0.8rem;
      font-family: 'Inter', monospace;
    }

    #typing {
      border-right: 2px solid var(--accent);
      padding-right: 4px;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { border-color: transparent; } }

    .bio {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 350;
    }

    .personal-details {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .personal-item {
      background: var(--detail-bg);
      border: 1px solid var(--border-light);
      border-radius: 2rem;
      padding: 0.4rem 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
    }

    .personal-item i {
      color: var(--icon-color);
      font-size: 0.9rem;
    }

    .details-row {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .detail-item {
      background: var(--detail-bg);
      border: 1px solid var(--border-light);
      border-radius: 2rem;
      padding: 0.7rem 0.2rem;
      min-width: 90px;
      flex: 1;
      text-align: center;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }

    .detail-item:hover {
      transform: translateY(-3px);
      background: var(--accent-soft);
    }

    .detail-item i {
      display: block;
      font-size: 1.2rem;
      color: var(--icon-color);
      margin-bottom: 0.2rem;
    }

    .detail-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .detail-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 0.2rem;
    }

    .skills-section {
      margin-bottom: 2rem;
    }

    .skills-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin-bottom: 0.8rem;
      text-align: center;
      font-weight: 500;
    }

    .skill-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }

    .skill-badge {
      background: var(--badge-bg);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: 0.2s;
    }

    .skill-badge:hover {
      background: var(--accent-soft);
      transform: scale(1.03);
    }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .social-link {
      background: var(--detail-bg);
      border: 1px solid var(--border-light);
      border-radius: 3rem;
      padding: 0.5rem 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: 0.2s;
      backdrop-filter: blur(4px);
      text-decoration: none;
    }

    .social-link i {
      color: var(--icon-color);
      font-size: 1rem;
    }

    .social-link:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .visitor {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--detail-bg);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      margin: 0 auto 1.5rem;
      backdrop-filter: blur(4px);
      color: var(--text-secondary);
      width: fit-content;
    }

    .visitor i {
      color: var(--accent);
    }

    footer {
      text-align: center;
      font-size: 0.65rem;
      color: var(--footer-color);
      border-top: 1px solid var(--border-light);
      padding-top: 1.2rem;
      margin-top: 0.2rem;
      font-weight: 300;
    }

    @media (max-width: 380px) {
      .card { padding: 1.5rem 1rem; border-radius: 2.5rem; }
      h1 { font-size: 1.8rem; }
      .detail-item { min-width: 75px; }
      .detail-value { font-size: 0.75rem; }
      .social-link { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
    }

    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="card">
    <div class="top-bar">
      <div class="action-group">
        <button class="action-btn" id="copyUsernameBtn"><i class="fas fa-copy"></i> copy</button>
        <button class="action-btn" id="shareProfileBtn"><i class="fas fa-share-alt"></i> share</button>
      </div>
      <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
        <span>theme</span>
      </div>
    </div>

    <div class="avatar-wrapper">
      <img class="avatar-img" id="profileImage" src="https://via.placeholder.com/150/1a1f2e/cccccc?text=👤" alt="profile">
      <div class="rotating-ring"></div>
    </div>

    <h1 id="fullName">『1』ꪑꫀꪑꫀ ꪜꪖ꠸ꪗꪖ</h1>
    <div class="typing-container"><span id="typing"></span></div>
    <div class="bio" id="bioText"></div>

    <!-- Personal Details Section -->
    <div class="personal-details" id="personalDetailsContainer"></div>

    <!-- Details Row (max 3) -->
    <div class="details-row" id="detailsContainer"></div>

    <!-- Skills -->
    <div class="skills-section">
      <div class="skills-title"><i class="fas fa-code"></i> tech stack</div>
      <div class="skill-badges" id="skillsContainer"></div>
    </div>

    <!-- Social Links (ALL) -->
    <div class="social-links" id="socialContainer"></div>

    <!-- Visitor Counter -->
    <div class="visitor" id="visitorDisplay">
      <i class="fas fa-eye"></i> <span>visitors: 0</span>
    </div>

    <footer>
      © 2026 『1』ꪑꫀꪑꫀ ꪜꪖ꠸ꪗꪖ — all right
    </footer>
  </div>

  <script>
    (function() {
      const themeToggle = document.getElementById('themeToggle');
      const body = document.body;
      themeToggle.addEventListener('click', () => {
        body.classList.toggle('light-mode');
        const icon = themeToggle.querySelector('i');
        icon.className = body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
      });

      let appData = {
        profile: { image: '', name: 'PRIME XYRON', headline: 'developer & creator', bio: 'crafting immersive web experiences · 5+ years' },
        personalDetails: [],
        details: [],
        skills: [],
        socialLinks: [],
        visitorCounter: 128,
        theme: { primaryColor: '#4affd8', accentGlow: '#b07cff', bgStart: '#141b2b', bgEnd: '#0b0f17', fireEnabled: false }
      };

      function hexToRgb(hex) {
        let r = 0, g = 0, b = 0;
        if (hex.length === 4) {
          r = parseInt(hex[1] + hex[1], 16);
          g = parseInt(hex[2] + hex[2], 16);
          b = parseInt(hex[3] + hex[3], 16);
        } else if (hex.length === 7) {
          r = parseInt(hex[1] + hex[2], 16);
          g = parseInt(hex[3] + hex[4], 16);
          b = parseInt(hex[5] + hex[6], 16);
        }
        return `${r}, ${g}, ${b}`;
      }

      function applyThemeColors() {
        if (appData.theme) {
          document.documentElement.style.setProperty('--accent', appData.theme.primaryColor || '#4affd8');
          document.documentElement.style.setProperty('--icon-color', appData.theme.primaryColor || '#4affd8');
          const rgb = hexToRgb(appData.theme.primaryColor || '#4affd8');
          document.documentElement.style.setProperty('--accent-soft', `rgba(${rgb}, 0.15)`);
          const bgStart = appData.theme.bgStart || '#141b2b';
          const bgEnd = appData.theme.bgEnd || '#0b0f17';
          document.documentElement.style.setProperty('--bg-gradient', `radial-gradient(circle at 30% 30%, ${bgStart}, ${bgEnd})`);
        }
      }

      // Load data
      fetch('data.json')
        .then(r => r.json())
        .then(json => {
          appData = { ...appData, ...json };
          const saved = localStorage.getItem('portfolioData');
          if (saved) {
            try {
              const local = JSON.parse(saved);
              appData = { ...appData, ...local };
              if (local.personalDetails) appData.personalDetails = local.personalDetails;
              if (local.details) appData.details = local.details;
              if (local.skills) appData.skills = local.skills;
              if (local.socialLinks) appData.socialLinks = local.socialLinks;
              if (local.theme) appData.theme = { ...appData.theme, ...local.theme };
            } catch (e) {}
          }
          applyThemeColors();
          renderAll();
          initParticles(appData.theme.fireEnabled);
        })
        .catch(() => {
          const saved = localStorage.getItem('portfolioData');
          if (saved) {
            try { appData = JSON.parse(saved); } catch (e) {}
          }
          applyThemeColors();
          renderAll();
          initParticles(appData.theme.fireEnabled);
        });

      function renderAll() {
        document.getElementById('fullName').innerText = appData.profile.name || '『1』ꪑꫀꪑꫀ ꪜꪖ꠸ꪗꪖ';
        document.getElementById('bioText').innerText = appData.profile.bio || 'crafting immersive web experiences · 5+ years';
        if (appData.profile.image) {
          document.getElementById('profileImage').src = appData.profile.image;
        }

        // Personal Details
        const personalHtml = (appData.personalDetails || []).map(p => `
          <div class="personal-item">
            <i class="fas fa-${p.icon || 'circle'}"></i>
            <span>${p.label}: ${p.value}</span>
          </div>
        `).join('');
        document.getElementById('personalDetailsContainer').innerHTML = personalHtml;

        // Details (first 3)
        const detailsHtml = (appData.details || []).slice(0,3).map(d => `
          <div class="detail-item">
            <i class="fas fa-${d.icon || 'circle'}"></i>
            <div class="detail-label">${d.label}</div>
            <div class="detail-value">${d.value}</div>
          </div>
        `).join('');
        document.getElementById('detailsContainer').innerHTML = detailsHtml;

        // Skills
        const skillsHtml = (appData.skills || []).map(s => `<span class="skill-badge">${s}</span>`).join('');
        document.getElementById('skillsContainer').innerHTML = skillsHtml;

        // Social Links (ALL)
        const socialHtml = (appData.socialLinks || []).map(link => `
          <a href="${link.url}" target="_blank" class="social-link">
            <i class="${link.icon || 'fas fa-link'}"></i> ${link.platform}
          </a>
        `).join('');
        document.getElementById('socialContainer').innerHTML = socialHtml;

        // Visitor counter
        let counter = appData.visitorCounter || 0;
        if (!localStorage.getItem('visited')) {
          counter++;
          appData.visitorCounter = counter;
          localStorage.setItem('portfolioData', JSON.stringify(appData));
          localStorage.setItem('visited', '1');
        }
        document.getElementById('visitorDisplay').innerHTML = `<i class="fas fa-eye"></i> <span>visitors: ${counter}</span>`;

        startTyping(appData.profile.headline || 'developer & creator');
      }

      function startTyping(headline) {
        const typingEl = document.getElementById('typing');
        let text = headline;
        let i = 0;
        function type() {
          if (i <= text.length) {
            typingEl.innerText = text.slice(0, i);
            i++;
            setTimeout(type, 80);
          } else {
            setTimeout(() => {
              i = 0;
              type();
            }, 2000);
          }
        }
        type();
      }

      document.getElementById('copyUsernameBtn').addEventListener('click', () => {
        const name = appData.profile.name || 'prime xyron';
        navigator.clipboard?.writeText(name);
        alert(`copied: ${name}`);
      });

      document.getElementById('shareProfileBtn').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({ title: appData.profile.name, url: window.location.href });
        } else {
          alert('share link: ' + window.location.href);
        }
      });

      // Particle system (fire animation)
      let particles = [];
      let animationFrame;
      let canvas, ctx, w, h;
      let fireMode = false;

      function initParticles(fireEnabled) {
        fireMode = fireEnabled;
        canvas = document.getElementById('particles');
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const count = fireMode ? 40 : 30;
        particles = [];
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * (fireMode ? 3 : 2.5) + 0.5,
            dx: (Math.random() - 0.5) * (fireMode ? 0.3 : 0.2),
            dy: (Math.random() - 0.5) * (fireMode ? 0.3 : 0.2),
            color: fireMode ? getFireColor() : 'rgba(180, 210, 255, 0.15)'
          });
        }
        if (animationFrame) cancelAnimationFrame(animationFrame);
        drawParticles();
      }

      function getFireColor() {
        const colors = ['rgba(255, 100, 50, 0.2)', 'rgba(255, 150, 50, 0.2)', 'rgba(200, 50, 0, 0.2)', 'rgba(255, 200, 50, 0.2)'];
        return colors[Math.floor(Math.random() * colors.length)];
      }

      function resizeCanvas() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
      }

      function drawParticles() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.shadowColor = fireMode ? '#ff6600' : '#aaccff';
          ctx.shadowBlur = fireMode ? 12 : 8;
          ctx.fill();
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > w) p.dx *= -1;
          if (p.y < 0 || p.y > h) p.dy *= -1;
        });
        animationFrame = requestAnimationFrame(drawParticles);
      }

      // Listen for storage changes (if admin updates in another tab)
      window.addEventListener('storage', (e) => {
        if (e.key === 'portfolioData') {
          location.reload();
        }
      });
    })();
  </script>
</body>
</html>
